---
name: Build
on:
  push:
    branches:
      - "main"
      - "**-ci"
  pull_request:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Git Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
          submodules: true

      - name: Linear PR history
        if: github.event_name == 'pull_request'
        uses: NexusPHP/no-merge-commits@v2.4.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check Linear issue link
        if: github.event_name == 'pull_request'
        uses: hushsecurity/commit-message-checker@main
        with:
          pattern: "^HUSH-[1-9][0-9]* "
          error: Linear issue link check failed
          excludeDescription: true
          checkAllCommitMessages: true
          accessToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.14.8"

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4
          install-mode: "binary"

      - name: Lint
        run: make lint

      - name: Test
        run: make test

      - name: Build
        run: make build

      - name: Check docs are up to date
        run: |
          go install github.com/hashicorp/terraform-plugin-docs/cmd/tfplugindocs@v0.24.0
          tfplugindocs --version
          make docs
          if ! git diff --quiet docs/ || [ -n "$(git ls-files --others --exclude-standard docs/)" ]; then
            echo "Documentation is out of sync. Please run 'make docs' and commit the changes."
            git diff docs/
            git ls-files --others --exclude-standard docs/
            exit 1
          fi
          make validate-docs
